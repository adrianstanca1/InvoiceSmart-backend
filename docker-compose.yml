version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: invoicesmart-db
    environment:
      POSTGRES_USER: cortexbuild
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: invoicesmart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexbuild -d invoicesmart"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoicesmart-backend
    environment:
      NODE_ENV: production
      PORT: 3008
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: cortexbuild
      DB_NAME: invoicesmart
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DATABASE_URL: postgresql://cortexbuild:${DB_PASSWORD:-changeme}@db:5432/invoicesmart?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "3008:3008"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
