version: "3.8"

services:
  invoicesmart-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: invoicesmart-backend
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DB_HOST=cortexbuild-postgres
    restart: unless-stopped
    networks:
      - cortexbuild
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3008/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  cortexbuild:
    external: true
