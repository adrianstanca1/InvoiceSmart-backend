version: "3.8"

services:
  invoicesmart-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: invoicesmart-backend
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=cortexbuild-postgres
      # DATABASE_URL, JWT_SECRET & OLLAMA_URL are read from .env
    restart: unless-stopped
    networks:
      - cortexbuild
    # No db service here; reuse existing PostgreSQL instance

networks:
  cortexbuild:
    external: true
